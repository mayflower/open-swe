services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-swe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_swe
      POSTGRES_USER: open_swe
      POSTGRES_PASSWORD: open_swe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_swe -d open_swe"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
